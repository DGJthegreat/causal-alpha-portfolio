<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulator — CausalAlpha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="shared.js"></script>
<style>
.sim-layout { display: grid; grid-template-columns: 340px 1fr; gap: 48px; align-items: start; }
.sim-panel { position: sticky; top: 80px; }
.sim-panel h3 { font-family: var(--font-serif); font-size: 22px; font-weight: 400; margin-bottom: 20px; }
.sim-group { margin-bottom: 28px; border-top: 1px solid var(--rule); padding-top: 16px; }
.sim-group h4 { font-family: var(--font-mono); font-size: 9px; font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 14px; }
.output-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 24px; }
.out-cell { background: var(--ground); padding: 16px 18px; }
.out-label { font-family: var(--font-mono); font-size: 9px; font-weight: 300; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); display: block; margin-bottom: 4px; }
.out-value { font-family: var(--font-mono); font-size: 28px; font-weight: 500; display: block; letter-spacing: -0.02em; transition: all 0.3s; }
.out-value.amber { color: var(--amber); }
.out-value.green { color: var(--green); }
.out-value.red { color: var(--red); }
.lift-banner { background: var(--module-bg); border: 1px solid var(--rule); padding: 14px 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.lift-banner .lift-label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); letter-spacing: 0.1em; text-transform: uppercase; }
.lift-banner .lift-val { font-family: var(--font-mono); font-size: 20px; font-weight: 500; }
.sum-indicator { font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; display: inline-block; margin-bottom: 12px; }
.sum-ok { background: var(--green-light); color: var(--green); border: 1px solid #8BC98F; }
.sum-bad { background: var(--red-light); color: var(--red); border: 1px solid #E57373; }
@media (max-width: 900px) { .sim-layout { grid-template-columns: 1fr; } .sim-panel { position: static; } }
</style>
</head>
<body>
<script>renderNav('simulator')</script>

<div class="container">
  <div class="page-title">Port<em>folio</em> Simulator</div>
</div>

<section class="section-sm">
  <div class="container">
    <div class="sim-layout">

      <!-- LEFT: Controls -->
      <div class="sim-panel">
        <div class="preset-btns">
          <button class="preset-btn" onclick="applyPreset('target')">Current</button>
          <button class="preset-btn" onclick="applyPreset('optimal')">Max-Sharpe (3×)</button>
          <button class="preset-btn" onclick="applyPreset('conservative')">Conservative</button>
          <button class="preset-btn" onclick="applyPreset('aggressive')">Max-CAGR (2.5×)</button>
        </div>

        <div class="sim-group">
          <h4>Portfolio Allocation <span id="sum-indicator" class="sum-indicator sum-ok">= 100%</span></h4>
          <div class="slider-row">
            <label>VIX_GATE</label>
            <input type="range" id="sl-vg" min="0" max="100" value="50">
            <span class="slider-val" id="sv-vg">50%</span>
          </div>
          <div class="slider-row">
            <label>Options</label>
            <input type="range" id="sl-opt" min="0" max="100" value="20">
            <span class="slider-val" id="sv-opt">20%</span>
          </div>
          <div class="slider-row">
            <label>Idle/Cash</label>
            <input type="range" id="sl-idle" min="0" max="100" value="25">
            <span class="slider-val" id="sv-idle">25%</span>
          </div>
          <div class="slider-row">
            <label>CALLS</label>
            <input type="range" id="sl-calls" min="0" max="100" value="5">
            <span class="slider-val" id="sv-calls">5%</span>
          </div>
        </div>

        <div class="sim-group">
          <h4>Leverage</h4>
          <div class="radio-row">
            <label class="radio-label">VIX_GATE</label>
            <button class="radio-btn" data-group="lev-vg" data-val="1">1×</button>
            <button class="radio-btn" data-group="lev-vg" data-val="1.5">1.5×</button>
            <button class="radio-btn selected" data-group="lev-vg" data-val="2">2×</button>
            <button class="radio-btn" data-group="lev-vg" data-val="3">3×</button>
          </div>
          <div class="radio-row">
            <label class="radio-label">Options</label>
            <button class="radio-btn selected" data-group="lev-opt" data-val="1">1×</button>
            <button class="radio-btn" data-group="lev-opt" data-val="1.5">1.5×</button>
            <button class="radio-btn" data-group="lev-opt" data-val="2">2×</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: Output -->
      <div>
        <div class="output-metrics">
          <div class="out-cell"><span class="out-label">CAGR</span><span class="out-value amber" id="out-cagr">—</span></div>
          <div class="out-cell"><span class="out-label">Sharpe</span><span class="out-value" id="out-sharpe">—</span></div>
          <div class="out-cell"><span class="out-label">Max Drawdown</span><span class="out-value" id="out-maxdd">—</span></div>
          <div class="out-cell"><span class="out-label">Calmar</span><span class="out-value" id="out-calmar">—</span></div>
        </div>
        <div class="lift-banner">
          <span class="lift-label">vs Nifty50 benchmark</span>
          <span class="lift-val" id="out-lift">—</span>
        </div>
        <div class="chart-wrap" style="height:320px;"><canvas id="sim-chart"></canvas></div>
      </div>
    </div>
  </div>
</section>

<script>
const PRESETS = {
  target:       { vg: 50, opt: 20, idle: 25, calls: 5,  levVg: 2,   levOpt: 1   },  // ADX+MOM20 current: CAGR+21.6%, Sh=1.18, MaxDD-25.9%
  optimal:      { vg: 40, opt: 15, idle: 33, calls: 12, levVg: 3,   levOpt: 1   },  // Max-Sharpe 30% budget: CAGR+22.3%, Sh=1.20, MaxDD-27.2%
  conservative: { vg: 30, opt: 10, idle: 60, calls: 0,  levVg: 1,   levOpt: 1   },
  aggressive:   { vg: 40, opt: 15, idle: 35, calls: 10, levVg: 2.5, levOpt: 1   },  // Max-CAGR 30% budget: CAGR+24.2%, Sh=1.10, MaxDD-29.8%
};

let portData = null; // { dates, vg, opt, strad, nifty }
let simChart = null;
let levVg = 2, levOpt = 1;

// Load data
parseCSV('data/results/portfolio_combination.csv').then(rows => {
  portData = {
    dates: rows.map(r => r.date),
    vg:    rows.map(r => parseFloat(r.vixgate_nav)),
    opt:   rows.map(r => parseFloat(r.options_nav)),
    strad: rows.map(r => parseFloat(r.straddle_nav)),
    nifty: rows.map(r => parseFloat(r.nifty_nav)),
  };
  recalc();
}).catch(() => {
  // Fallback synthetic
  const n = 100;
  const dates = Array.from({length: n}, (_, i) => {
    const d = new Date('2022-01-03'); d.setDate(d.getDate() + i * 7);
    return d.toISOString().slice(0, 10);
  });
  const synth = (start, vol, drift) => {
    let v = start;
    return dates.map(() => { v *= (1 + drift + (Math.random() - 0.48) * vol); return v; });
  };
  portData = {
    dates, vg: synth(1, 0.02, 0.002), opt: synth(1, 0.025, 0.003),
    strad: synth(1, 0.01, 0.001), nifty: synth(1, 0.018, 0.0015),
  };
  recalc();
});

function getWeights() {
  return {
    vg:    parseInt(document.getElementById('sl-vg').value) / 100,
    opt:   parseInt(document.getElementById('sl-opt').value) / 100,
    idle:  parseInt(document.getElementById('sl-idle').value) / 100,
    calls: parseInt(document.getElementById('sl-calls').value) / 100,
  };
}

function recalc() {
  if (!portData) return;
  const w = getWeights();
  const sum = Object.values(w).reduce((a, b) => a + b, 0);

  const ind = document.getElementById('sum-indicator');
  ind.textContent = '= ' + Math.round(sum * 100) + '%';
  ind.className = 'sum-indicator ' + (Math.abs(sum - 1) < 0.01 ? 'sum-ok' : 'sum-bad');

  const n = portData.dates.length;
  // Compute daily returns per strategy
  const vgRet = dailyReturns(portData.vg);
  const optRet = dailyReturns(portData.opt);
  const niftyRet = dailyReturns(portData.nifty);

  // Combined daily return with leverage and weights
  const combRet = vgRet.map((_, i) =>
    w.vg * levVg * vgRet[i] +
    w.opt * levOpt * optRet[i] +
    w.idle * 0 +
    w.calls * levOpt * optRet[i] * 0.5
  );

  // Build NAV from returns
  const combNav = [1];
  combRet.forEach(r => combNav.push(combNav[combNav.length - 1] * (1 + r)));
  const niftyNav = normalizeTo1(portData.nifty);

  const years = calcYears(portData.dates);
  const cagr = calcCAGR(combNav, years);
  const sharpe = calcSharpe(combRet);
  const maxdd = calcMaxDD(combNav);
  const calmar = maxdd !== 0 ? -(cagr / maxdd) : 0;
  const niftyCagr = calcCAGR(niftyNav, years);
  const lift = cagr - niftyCagr;

  document.getElementById('out-cagr').textContent = fmtPct(cagr, 1);
  document.getElementById('out-cagr').className = 'out-value ' + (cagr >= 0 ? 'amber' : 'red');
  document.getElementById('out-sharpe').textContent = fmtSharpe(sharpe);
  document.getElementById('out-sharpe').className = 'out-value ' + (sharpe >= 1 ? 'green' : sharpe >= 0 ? '' : 'red');
  document.getElementById('out-maxdd').textContent = (maxdd * 100).toFixed(1) + '%';
  document.getElementById('out-maxdd').className = 'out-value ' + (maxdd > -0.2 ? '' : 'red');
  document.getElementById('out-calmar').textContent = fmtNum(calmar, 2);
  document.getElementById('out-lift').textContent = (lift >= 0 ? '+' : '') + (lift * 100).toFixed(1) + '% annualized vs Nifty';
  document.getElementById('out-lift').className = 'lift-val ' + (lift >= 0 ? 'green' : 'red');

  // Chart — skip every 3 for performance
  const skip = 3;
  const labels = portData.dates.filter((_, i) => i % skip === 0);
  const cd = combNav.filter((_, i) => i % skip === 0);
  const nd = niftyNav.filter((_, i) => i % skip === 0);

  if (simChart) {
    simChart.data.labels = labels;
    simChart.data.datasets[0].data = cd;
    simChart.data.datasets[1].data = nd;
    simChart.update('none');
  } else {
    simChart = buildLineChart('sim-chart', labels, [
      lineDataset('Combined Strategy', cd, '#B8760A', { width: 2.5, fill: true }),
      lineDataset('Nifty50', nd, '#C8C4BC', { borderDash: [4, 4] }),
    ]);
  }
}

// Wire sliders
['vg', 'opt', 'idle', 'calls'].forEach(key => {
  const slider = document.getElementById('sl-' + key);
  slider.addEventListener('input', () => {
    document.getElementById('sv-' + key).textContent = slider.value + '%';
    recalc();
  });
});

// Wire radio buttons
document.querySelectorAll('.radio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const group = btn.dataset.group;
    document.querySelectorAll(`.radio-btn[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const val = parseFloat(btn.dataset.val);
    if (group === 'lev-vg') levVg = val;
    if (group === 'lev-opt') levOpt = val;
    recalc();
  });
});

// Presets
function applyPreset(name) {
  const p = PRESETS[name];
  document.getElementById('sl-vg').value = p.vg;    document.getElementById('sv-vg').textContent = p.vg + '%';
  document.getElementById('sl-opt').value = p.opt;   document.getElementById('sv-opt').textContent = p.opt + '%';
  document.getElementById('sl-idle').value = p.idle;  document.getElementById('sv-idle').textContent = p.idle + '%';
  document.getElementById('sl-calls').value = p.calls; document.getElementById('sv-calls').textContent = p.calls + '%';
  levVg = p.levVg; levOpt = p.levOpt;

  document.querySelectorAll('.radio-btn[data-group="lev-vg"]').forEach(b => {
    b.classList.toggle('selected', parseFloat(b.dataset.val) === levVg);
  });
  document.querySelectorAll('.radio-btn[data-group="lev-opt"]').forEach(b => {
    b.classList.toggle('selected', parseFloat(b.dataset.val) === levOpt);
  });
  recalc();
}
</script>
</body>
</html>
