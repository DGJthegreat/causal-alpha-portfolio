<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status — CausalAlpha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="shared.js"></script>
<style>
.status-4col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); }
.status-col { background: var(--ground); padding: 0; }
.status-col-header { padding: 16px 20px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; gap: 8px; }
.status-col-header h3 { font-family: var(--font-mono); font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
.status-items { list-style: none; }
.status-item { padding: 14px 20px; border-bottom: 1px solid var(--module-bg); display: flex; gap: 10px; align-items: flex-start; }
.status-item:last-child { border-bottom: none; }
.status-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.si-title { font-family: var(--font-mono); font-size: 11px; font-weight: 500; display: block; margin-bottom: 3px; }
.si-desc { font-size: 11px; color: var(--ink-muted); line-height: 1.5; }
.si-metric { font-family: var(--font-mono); font-size: 10px; font-weight: 400; color: var(--amber); display: block; margin-top: 2px; }
@media (max-width: 1024px) { .status-4col { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .status-4col { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<script>renderNav('status')</script>

<div class="container">
  <div class="page-title">Project <em>Status</em></div>
</div>

<section class="section-sm">
  <div class="container">
    <p class="section-label" id="status-date-label">Current State</p>
    <div class="status-4col reveal" id="status-grid">
      <div class="status-col" style="grid-column:1/-1;">
        <div style="padding:32px;color:var(--ink-muted);font-family:var(--font-mono);font-size:11px;">Loading…</div>
      </div>
    </div>
  </div>
</section>

<section class="section-sm">
  <div class="container">
    <p class="section-label">Research Roadmap</p>
    <div class="roadmap reveal" id="roadmap-grid"></div>
  </div>
</section>

<script>
loadJSON('data_status.json').then(data => {
  document.getElementById('status-date-label').textContent =
    'Current State — ' + (data.lastUpdated || new Date().toISOString().slice(0,10));

  const buildCol = (badgeCls, badgeText, heading, items, icon) => `
    <div class="status-col">
      <div class="status-col-header">
        <span class="badge ${badgeCls}">${badgeText}</span>
        <h3>${heading}</h3>
      </div>
      <ul class="status-items">
        ${(items||[]).map(item => `
          <li class="status-item">
            <div class="status-icon">${icon}</div>
            <div>
              <span class="si-title">${item.title}</span>
              <span class="si-desc">${item.desc}</span>
              ${item.metric ? '<span class="si-metric">'+item.metric+'</span>' : ''}
            </div>
          </li>`).join('')}
      </ul>
    </div>`;

  document.getElementById('status-grid').innerHTML =
    buildCol('active',   'Working',    "What's Working",      data.working||[], '✓') +
    buildCol('fail',     'Failed',     "What's Not Working",  data.failed||[], '✗') +
    buildCol('warn',     'Risks',      'Known Risks',         data.risks||[], '△') +
    buildCol('research', 'Next Steps', 'What to Build Next',  data.next||[], '→');

  document.getElementById('roadmap-grid').innerHTML = (data.roadmap||[]).map(r => `
    <div class="roadmap-card">
      <span class="roadmap-num">${r.num}</span>
      <h4>${r.title}</h4>
      <p>${r.desc}</p>
      <span class="effort-tag">${r.effort}</span>
    </div>`).join('');

}).catch(() => {
  document.getElementById('status-date-label').textContent = 'Status — data_status.json not found';
  document.getElementById('status-grid').innerHTML = `
    <div class="status-col" style="grid-column:1/-1;">
      <div style="padding:32px;">
        <p style="font-family:var(--font-mono);font-size:12px;color:var(--red);">Could not load data_status.json</p>
        <p style="font-family:var(--font-mono);font-size:11px;color:var(--ink-muted);margin-top:8px;">
          Run <code>python update_status.py touch</code> or ensure data_status.json exists alongside status.html.</p>
      </div>
    </div>`;
});
</script>
</body>
</html>
